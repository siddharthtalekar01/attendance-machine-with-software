; ESP32-S3 fingerprint attendance machine
; Board: Waveshare ESP32-S3 2.8" IPS LCD (Arduino: "ESP32S3 Dev Module")

[env:esp32s3-attendance]
platform = espressif32 @ ^6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Waveshare ESP32-S3-Touch-LCD-2.8: 16MB Flash, 8MB OPI PSRAM
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    adafruit/Adafruit Fingerprint Sensor Library@^2.1.0
    adafruit/Adafruit BusIO@^1.16.0
    bblanchon/ArduinoJson@^7.2.0
    arduino-libraries/NTPClient@^3.2.1
    paulstoffregen/Time@^1.6.1

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSER_SETUP_LOADED=1
    -include include/User_Setup.h

lib_ignore =
    SD
